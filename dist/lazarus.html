    <style>
        .lazarus-hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        .loader {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 2rem;
        }

        .loader span {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top: 4px solid var(--color-primary-cyan);
            animation: spin 2s linear infinite;
        }

        .loader span::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top: 4px solid var(--color-secondary-purple);
            animation: spin 3s linear infinite reverse;
        }

        .loader span::after {
            content: '';
            position: absolute;
            top: 24px;
            left: 24px;
            right: 24px;
            bottom: 24px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top: 4px solid var(--color-success);
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .lazarus-text {
            font-size: 2rem;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            animation: textGlow 2s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            from {
                text-shadow: 0 0 10px var(--color-primary-cyan);
                opacity: 0.5;
            }

            to {
                text-shadow: 0 0 20px var(--color-secondary-purple), 0 0 30px var(--color-primary-cyan);
                opacity: 1;
            }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--color-primary-cyan);
            border-radius: 50%;
            animation: float 10s infinite linear;
            opacity: 0;
            box-shadow: 0 0 10px var(--color-primary-cyan);
        }

        .particle:nth-child(1) {
            top: 100%;
            left: 20%;
            animation-duration: 12s;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            top: 100%;
            left: 80%;
            animation-duration: 15s;
            background: var(--color-secondary-purple);
            box-shadow: 0 0 10px var(--color-secondary-purple);
            animation-delay: 2s;
        }

        .particle:nth-child(3) {
            top: 100%;
            left: 60%;
            animation-duration: 8s;
            animation-delay: 4s;
        }

        .particle:nth-child(4) {
            top: 100%;
            left: 30%;
            animation-duration: 14s;
            background: var(--color-secondary-purple);
            box-shadow: 0 0 10px var(--color-secondary-purple);
            animation-delay: 1s;
        }

        .particle:nth-child(5) {
            top: 100%;
            left: 70%;
            animation-duration: 10s;
            animation-delay: 3s;
        }

        @keyframes float {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }

            10% {
                opacity: 0.8;
            }

            100% {
                transform: translateY(-110vh) translateX(20px);
                opacity: 0;
            }
        }
    </style>
